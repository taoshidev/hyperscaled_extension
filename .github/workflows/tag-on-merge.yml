name: Tag on Merge

on:
  push:
    branches:
      - main
      - store-deployment-automation

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: manifest
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Fail if version not bumped
        run: |
          MANIFEST_VERSION="v${{ steps.manifest.outputs.version }}"
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ "$MANIFEST_VERSION" = "$LATEST_TAG" ]; then
            echo "❌ manifest.json version ($MANIFEST_VERSION) matches the latest tag. Bump the version before merging."
            exit 1
          fi
          echo "✅ New version: $MANIFEST_VERSION (previous: ${LATEST_TAG:-none})"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.manifest.outputs.version }}"
          git push origin "v${{ steps.manifest.outputs.version }}"
